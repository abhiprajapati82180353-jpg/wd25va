<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in js</title>
</head>
<body>
    <script>
        // loops used:
        // for loops---
        let studentList=["abhi","rohit","manish","koyal","raju","manish"];
        for(let i=0;i<studentList.length;i++){
            console.log(studentList[i]);
        }
        // while loop
        let x=0;
        while(x<studentList.length){
            console.log(studentList[x]);
            x++;
        }
        // array string maps and sets
        for(let y of studentList){
            console.log(y);
        }

    </script>
</body>
</html>
